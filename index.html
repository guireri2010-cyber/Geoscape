<!DOCTYPE html>
<html>
<head>
  <title>GeoEscape</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="start-screen">
  <h1>🌍 GeoEscape</h1>
  <p>Enter your name</p>
  <input type="text" id="name" placeholder="Your name">
  <button onclick="startGame()">Start</button>
</div>

<div id="quiz-screen" style="display:none;">

  <p>⏱ Time: <span id="timer">180</span></p>

  <h2 id="question"></h2>

  <div id="answers"></div>

  <!-- DOOR GAME -->
  <div id="door-game" style="display:none;">
    <p>🚪 Choose the correct country</p>

    <div id="doors">
      <button onclick="chooseDoor(0)">🚪 🇪🇸 Spain</button>
      <button onclick="chooseDoor(1)">🚪 🇫🇷 France</button>
      <button onclick="chooseDoor(2)">🚪 🇯🇵 Japan</button>
    </div>
  </div>

  <!-- FOOD GAME -->
  <div id="food-game" style="display:none;"></div>

</div>

<div id="result-screen" style="display:none;">
  <h2 id="result"></h2>
</div>

<script src="script.js"></script>
</body>
</html>
