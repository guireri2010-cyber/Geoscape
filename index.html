<!DOCTYPE html>
<html>
<head>
  <title>GeoEscape</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="start-screen">
  <h1>🌍 GeoEscape</h1>
  <p>Enter your name</p>
  <input type="text" id="name" placeholder="Your name">
  <button onclick="startGame()">Start</button>
</div>

<div id="quiz-screen" style="display:none;">

  <p>⏱ Time: <span id="timer">180</span></p>

  <h2 id="question"></h2>

  <div id="answers"></div>

  <!-- MARIO GAME -->
  <div id="mario-game" style="display:none;">
    <p>🟩 Move to the correct pipe</p>

    <div id="game-area">
      <div id="player">🧍</div>

      <div class="pipe" onclick="choosePipe(0)">🟩</div>
      <div class="pipe" onclick="choosePipe(1)">🟩</div>
      <div class="pipe" onclick="choosePipe(2)">🟩</div>
    </div>

    <button onclick="moveLeft()">⬅️</button>
    <button onclick="moveRight()">➡️</button>
  </div>

  <!-- ARCADE GAME -->
  <div id="arcade-game" style="display:none;"></div>

</div>

<div id="result-screen" style="display:none;">
  <h2 id="result"></h2>
</div>

<script src="script.js"></script>
</body>
</html>
