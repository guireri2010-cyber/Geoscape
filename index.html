<!DOCTYPE html>
<html>
<head>
  <title>GeoEscape</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="start-screen">
  <h1>🌍 GeoEscape</h1>
  <p>Enter your name</p>
  <input type="text" id="name" placeholder="Your name">
  <button onclick="startGame()">Start</button>
</div>

<div id="quiz-screen" style="display:none;">
  <p>⏱ Time: <span id="timer">180</span></p>
  <h2 id="question"></h2>
  <div id="answers"></div>

  <!-- Zona juego -->
  <div id="game-area" style="display:none;">
    <p>Choose the correct pipe!</p>
    <div class="pipes">
      <button onclick="choosePipe(0)">🟩 Pipe A</button>
      <button onclick="choosePipe(1)">🟩 Pipe B</button>
      <button onclick="choosePipe(2)">🟩 Pipe C</button>
    </div>
  </div>
</div>

<div id="result-screen" style="display:none;">
  <h2 id="result"></h2>
</div>

<script src="script.js"></script>
</body>
</html>
